# Schedule Agent 配置示例
#
# === 豆包 (Doubao) ===
# 1. 需要在火山引擎控制台创建推理接口获取 endpoint_id
# 2. API Key 从火山引擎控制台获取
# 3. model 参数填写推理端点 ID (如 ep-20250117123456)
# 环境变量：DOUBAO_API_KEY, DOUBAO_MODEL
#
# === 阿里云百炼 Qwen ===
# 1. API Key 从百炼控制台获取：https://bailian.console.aliyun.com/
# 2. 使用 OpenAI 兼容端点，支持多轮工具调用 (Function Calling)
# 3. 推荐模型：qwen-3.5-plus
# 环境变量：QWEN_API_KEY 或 DASHSCOPE_API_KEY, QWEN_MODEL
#
# 使用方式：
# 方式1（推荐）：设置环境变量后运行
#   export QWEN_API_KEY="your-api-key"   # 或 DOUBAO_API_KEY
#   export QWEN_MODEL="qwen-3.5-plus"   # 或 DOUBAO_MODEL
#   python -m agent.main
# 方式2：在下方 llm 中直接填写（不推荐，容易泄露）

# 豆包 LLM 配置示例
# llm:
#   provider: "doubao"
#   api_key: "your-doubao-api-key-here"
#   base_url: "https://ark.cn-beijing.volces.com/api/v3"
#   model: "ep-20250117123456"  # 推理端点 ID
#   temperature: 0.7
#   max_tokens: 4096

# 阿里云百炼 Qwen 配置示例（推荐，支持多轮工具调用）
llm:
  provider: "qwen"
  api_key: "your-qwen-api-key-here"
  # base_url 可不填，默认使用百炼 OpenAI 兼容端点
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.5-plus"
  summary_model: "qwen-flash"  # 用于总结/提炼的轻量模型（可选）
  temperature: 0.7
  max_tokens: 4096
  request_timeout_seconds: 120  # LLM 请求超时（秒）
  stream: true  # 启用流式输出（推荐）
  # 联网搜索配置（仅支持阿里云百炼 Qwen）
  # 参见 https://help.aliyun.com/zh/model-studio/web-search
  enable_search: false  # 是否启用模型内建联网搜索（推荐保持 false，改用 Tavily MCP 工具）
  enable_thinking: false  # 是否启用思考模式（通过 extra_body 传递）
  thinking_budget: null  # 思考长度上限（可选；仅部分模型支持）
  enable_web_extractor: false  # 是否启用模型内建网页抓取（推荐保持 false，改用 extract_web_content + Tavily）
  # 参见 https://help.aliyun.com/zh/model-studio/web-extractor
  search_options:
    forced_search: false  # 是否强制联网搜索（默认模型自动判断）
    search_strategy: "turbo"  # 搜索策略: turbo(默认) | max | agent | agent_max（网页抓取需设为 agent_max）
    enable_source: false  # 是否返回搜索来源（仅 DashScope 协议支持）
    enable_citation: false  # 是否开启角标标注（需 enable_source=true）
    citation_format: "[<number>]"  # 角标格式: [<number>] | [ref_<number>]
    enable_search_extension: false  # 是否开启垂域搜索（天气、股票等）
    # freshness: 7  # 搜索时效性（天数）: 7 | 30 | 180 | 365
    # assigned_site_list: []  # 限定搜索来源站点列表（最多25个）

# 多模态识图配置（调用多模态大模型，不依赖本地 OCR 模型）
# 注意：原先通过 analyze_image 工具单独发起识图调用的路径已标记为「弃用」，
# 现在推荐使用 attach_media 工具声明需要在下一轮附带的图片/视频，
# 由运行时在下一次 LLM 调用前，将这些媒体编码为多模态 messages 的一部分。
multimodal:
  enabled: false
  model: null   # 例如: "qwen-vl-max-latest"；null 表示复用 llm.model
  max_image_size_mb: 8
  request_timeout_seconds: 120

# Canvas 集成配置
canvas:
  enabled: false
  api_key: null  # 推荐使用环境变量 CANVAS_API_KEY
  base_url: "https://oc.sjtu.edu.cn/api/v1"
  default_days_ahead: 60
  include_submitted: false

# 上海交通大学教学信息服务网课表同步配置
# 使用方式：
# 1. 在浏览器或 Playwright 中访问 https://i.sjtu.edu.cn/jaccountlogin 并完成 jAccount 登录
# 2. 将当前会话的 Cookie 导出为 JSON 文件（推荐使用 Playwright cookies.json 格式）
# 3. 将 cookies_path 指向该 JSON 文件
sjtu_jw:
  cookies_path: "./data/sjtu_jw_cookies.json"

# 水源社区（上海交通大学 Discourse 论坛）配置
# 获取 User-Api-Key：运行 python -m shuiyuan_integration.user_api_key，按提示在水源授权
# 环境变量：SHUIYUAN_USER_API_KEY
shuiyuan:
  owner_username: null  # 主人水源用户名，必须 @ 此用户且消息含 invocation_trigger 才触发
  invocation_trigger: ""  # 消息中必须包含此字符串才触发回复
  allowed_topic_ids: []  # 非空时用 topic 监控（轮询指定话题新帖，解析正文 @owner+trigger，含自 @）；为空时用 user_actions+notifications
  # 需同时运行 connector 轮询通知：python -m shuiyuan_integration.connector
  enabled: false
  user_api_key: null
  site_url: "https://shuiyuan.sjtu.edu.cn"
  db_path: "./data/shuiyuan/shuiyuan.db"
  memory:
    chat_limit_per_user: 100
    long_term_dir: "./data/memory/long_term/shuiyuan"
    thread_posts_count: 50
    tool_max_posts: 50  # 水源工具 search/get_topic 返回的最大帖子数
  rate_limit:
    replies_per_minute: 5

# 自动化定时任务配置（可选）
# 这里提供一个高层的“任务描述 + 时间间隔”入口，运行时会被转换为 automation 子系统的 JobDefinition，
# 由 automation_daemon 在后台统一调度并周期性执行。
automation:
  jobs:
    # 示例：每 6 小时同步课程（Canvas/course_stub）并生成系统级活动记录
    - name: "sync_course_canvas"
      description: "这是自动化定时任务。请调用 sync_canvas(days_ahead=30, write_tasks=true, write_deadline_events=true)，然后仅输出“操作 + 结果”。"
      interval_minutes: 360   # 或使用 daily_time: "08:00" 表示每天早上 8 点执行
      job_type: "sync.course"
      user_id: "default"
      enabled: true
    # 示例：每 2 小时同步邮件
    - name: "sync_email_sources"
      description: "这是自动化定时任务。请调用 sync_sources(source='email')，然后仅输出“操作 + 结果”。"
      interval_minutes: 120
      job_type: "sync.email"
      user_id: "default"
      enabled: true

# 时间配置
time:
  timezone: "Asia/Shanghai"
  sleep_start: "23:00"
  sleep_end: "08:00"

# 任务规划配置（plan_tasks 必需）
planning:
  timezone: "Asia/Shanghai"
  lookahead_days: 7
  min_block_minutes: 30
  break_minutes_after_task: 15   # 任务间休息时间（分钟），避免连轴转
  prefer_weekday_slots: true     # 优先工作日排程，周末作为补充
  # weekday: 1-7（周一到周日）
  working_hours:
    - weekday: 1
      start: "09:00"
      end: "22:00"
    - weekday: 2
      start: "09:00"
      end: "22:00"
    - weekday: 3
      start: "09:00"
      end: "22:00"
    - weekday: 4
      start: "09:00"
      end: "22:00"
    - weekday: 5
      start: "09:00"
      end: "22:00"
    - weekday: 6
      start: "09:00"
      end: "22:00"
    - weekday: 7
      start: "09:00"
      end: "22:00"
  weights:
    urgency: 0.4
    difficulty: 0.3
    importance: 0.3
    overdue_bonus: 0.2

# 存储配置
storage:
  type: "json"
  data_dir: "./data"
  events_file: "events.json"
  tasks_file: "tasks.json"

# 文件读写工具配置
# 读取默认启用，写入和修改需显式启用
file_tools:
  enabled: true       # 是否启用文件读写工具
  allow_read: true    # 允许读取文件
  allow_write: false  # 允许写入/创建文件（建议按需启用）
  allow_modify: false # 允许修改/追加文件（建议按需启用）
  base_dir: "."       # 相对路径的基准目录；绝对路径可访问任意位置（/etc、~/.config 等）

# Agent 配置
agent:
  max_iterations: 10
  enable_debug: true
  # 工具暴露模式：
  # - full: 每轮将全部工具发送给 LLM（兼容旧行为）
  # - kernel: 仅暴露核心工具 + working set（推荐用于控制 token）
  tool_mode: "full"
  # kernel 模式下 LRU 工作集大小（不含 pinned_tools）
  working_set_size: 6
  # 核心工具 + pinned_tools，kernel 模式下始终暴露
  # 核心：search_tools, call_tool；pinned：load_skill（skills 启用时）、read_file、write_file 等
  pinned_tools:
    - "search_tools"
    - "call_tool"
    - "load_skill"
    - "web_search"
    - "read_file"
    - "write_file"
    - "run_command"
    - "extract_web_content"
    - "attach_media"
    - "memory_search_long_term"
    - "memory_search_content"
    - "memory_store"
    - "memory_ingest"

# MCP 客户端配置（可选）
# 用于接入外部 MCP Server，并将远程工具自动注册到 Agent
mcp:
  enabled: true
  call_timeout_seconds: 30
  servers:
    # 本地工具 MCP（自动注册到 Agent）
    - name: "schedule_tools"
      enabled: true
      transport: "stdio"
      command: "python"
      args: ["mcp_server.py"]
      env: {}
      cwd: "."
      tool_name_prefix: "mcp_local"
      init_timeout_seconds: 15
      call_timeout_seconds: 30
    # Tavily 联网搜索 MCP（本地 stdio，推荐：避免 mcp-remote 远程握手在国内易超时）
    # 在 .env 中配置 TAVILY_API_KEY=tvly-xxx 后启用；从 https://tavily.com 获取 Key
    - name: "tavily"
      enabled: false
      transport: "stdio"
      command: "npx"
      args: ["-y", "tavily-mcp@latest"]
      env:
        NODE_NO_WARNINGS: "1"
        NODE_ENV: "production"
      cwd: "."
      tool_name_prefix: "tavily"
      init_timeout_seconds: 20
      call_timeout_seconds: 45

# 技能配置（仅从 cli_dir 读取，与 npx skills 统一）
skills:
  enabled: []  # 为空展示全部；可填 [find-skills, coding] 仅展示指定
  cli_dir: "~/.agents/skills"  # Skills CLI 默认目录

# 飞书集成配置（可选）
# 若要在飞书中使用 Schedule Agent，请在飞书开放平台创建企业自建应用并填写下列字段。
# 推荐使用环境变量 FEISHU_APP_ID / FEISHU_APP_SECRET / FEISHU_VERIFICATION_TOKEN / FEISHU_ENCRYPT_KEY 覆盖敏感信息。
feishu:
  enabled: false
  # App ID 与 App Secret 建议通过环境变量配置，这里仅作占位示例
  app_id: ""              # 飞书应用 App ID（可留空，使用 FEISHU_APP_ID）
  app_secret: ""          # 飞书应用 App Secret（可留空，使用 FEISHU_APP_SECRET）
  verification_token: ""  # 飞书事件订阅 Verification Token（可留空，使用 FEISHU_VERIFICATION_TOKEN）
  encrypt_key: ""         # 飞书事件订阅 Encrypt Key（启用消息加密时必填，可留空使用 FEISHU_ENCRYPT_KEY）
  base_url: "https://open.feishu.cn"  # 国际版可改为 https://open.larksuite.com
  domain: "feishu"        # feishu(中国大陆版) | lark(国际版)
  # 可选：将 automation Daemon 写入的 automation_activity.jsonl 活动简报同步到指定飞书会话
  # 建议填写一个专门用于接收系统通知的群聊/单聊 chat_id，而不是普通对话窗口。
  automation_activity_enabled: false
  automation_activity_chat_id: ""  # 目标 chat_id；也可通过环境变量 FEISHU_AUTOMATION_CHAT_ID 覆盖

# 记忆系统配置
memory:
  enabled: true
  # 工作记忆
  max_working_tokens: 8000        # 工作记忆窗口最大 token 数
  working_summary_threshold: 0.8  # 软阈值：tokens 达此比例且消息数 > keep_recent*2 时总结
  working_summary_hard_ratio: null  # 硬阈值：设为数字(如 5)则 tokens >= max_working_tokens*此值时强制总结，不受条数限制
  working_keep_recent: 4          # 总结时保留最近几轮原始消息
  # 短期记忆
  short_term_k: 20                # 保留最近 K 个会话摘要
  short_term_dir: "./data/memory/short_term"
  # 长期记忆
  long_term_dir: "./data/memory/long_term"
  memory_md_path: "./MEMORY.md"
  # 内容记忆
  content_dir: "./data/memory/content"
  # 检索策略
  recall_top_n: 5
  recall_score_threshold: 0.3
  force_recall: false             # 默认关闭；由 memory skill 引导 Agent 按需检索长期记忆
  # QMD 集成（可选）
  qmd_enabled: false
  qmd_command: "qmd"

# 日志配置
logging:
  session_log_dir: "./logs/sessions"
  enable_session_log: true
  enable_detailed_log: false
  max_system_prompt_log_len: 2000

# CLI 可视化配置
ui:
  show_draft: "summary"  # 草稿显示: off | summary | full
  draft_max_chars: 500   # summary 模式下草稿最大显示字符数
  dim_draft: true        # 草稿是否使用暗色显示
